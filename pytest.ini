[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: smoke-тесты, базовая работоспособность
    regression: регрессионный набор
    oracle: тест применим только к Oracle
    postgres: тест применим только к PostgreSQL
    mssql: тест применим только к MS SQL Server

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# JUnit XML для будущей интеграции с TestIT
addopts = --strict-markers -ra
